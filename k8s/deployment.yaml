# ===== BACKEND =====
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-property-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smart-property-backend
  template:
    metadata:
      labels:
        app: smart-property-backend
    spec:
      containers:
        - name: smart-property-backend
          image: hanafkiri5/smart-property-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
          envFrom:
            - secretRef:
                name: backend-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: smart-property-backend
  namespace: default
spec:
  type: NodePort
  selector:
    app: smart-property-backend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080
---
