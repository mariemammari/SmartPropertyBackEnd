# ===== RECOMMENDATION SYSTEM =====
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-system
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendation-system
  template:
    metadata:
      labels:
        app: recommendation-system
    spec:
      containers:
        - name: recommendation-system
          image: hanafkiri5/recommendation-system:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: recommendation-secrets
                  key: MONGODB_URI
---
apiVersion: v1
kind: Service
metadata:
  name: recommendation-system
  namespace: default
spec:
  type: NodePort
  selector:
    app: recommendation-system
  ports:
    - port: 8002
      targetPort: 8002
      nodePort: 30082